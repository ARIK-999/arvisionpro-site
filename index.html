<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Vision OS - By Ishraq Ahmed</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>

    <!-- AI Libraries (MediaPipe & TensorFlow) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js" crossorigin="anonymous"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body class="w-screen h-screen text-gray-900 dark:text-white transition-colors duration-500">

    <!-- 1. START MENU -->
    <div id="start-menu" class="absolute inset-0 z-50 flex items-center justify-center bg-gray-100 dark:bg-zinc-900 transition-opacity duration-700 bg-grid-pattern interactive">
        <div class="glass-panel p-10 rounded-3xl max-w-lg w-full text-center relative overflow-visible animate-float">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob pointer-events-none"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000 pointer-events-none"></div>
            
            <h1 class="text-5xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600 tracking-tight" id="t-title">
                AR Vision OS
            </h1>
            <p class="text-sm font-medium opacity-70 mb-8" id="t-subtitle">The Ultimate Interactive Reality</p>

            <div class="space-y-4 relative z-20">
                <button onclick="bootSystem()" class="w-full py-4 rounded-xl bg-white dark:bg-black text-black dark:text-white font-bold text-lg hover:scale-105 transition-transform shadow-lg border border-gray-200 dark:border-gray-800 flex items-center justify-center gap-2 cursor-pointer">
                    <i class="ph ph-power"></i> <span id="t-startbtn">Initialize System</span>
                </button>

                <div class="flex justify-center gap-4 mt-6">
                    <button onclick="toggleTheme()" class="p-3 rounded-xl glass-panel hover:bg-white/20 transition cursor-pointer border border-gray-400/30">
                        <i class="ph ph-moon dark:hidden text-xl"></i>
                        <i class="ph ph-sun hidden dark:block text-xl"></i>
                    </button>
                    
                    <!-- Premium Custom Language Dropdown -->
                    <div class="relative group" id="lang-container">
                        <button onclick="toggleLangDropdown()" class="glass-panel px-5 py-3 rounded-xl flex items-center gap-3 hover:bg-white/20 transition cursor-pointer border border-gray-400/30">
                            <i class="ph ph-translate text-xl"></i> 
                            <span id="current-lang-txt" class="font-semibold">English</span> 
                            <i class="ph ph-caret-down"></i>
                        </button>
                        
                        <div id="lang-dropdown" class="absolute top-full mt-2 left-0 w-full glass-panel rounded-xl flex-col overflow-hidden hidden z-50 border border-gray-400/30 shadow-2xl backdrop-blur-2xl">
                            <button onclick="setLanguage('en', 'English')" class="w-full px-4 py-3 text-left hover:bg-blue-500 hover:text-white transition cursor-pointer border-b border-gray-500/20">English</button>
                            <button onclick="setLanguage('bn', 'বাংলা (Bangla)')" class="w-full px-4 py-3 text-left hover:bg-blue-500 hover:text-white transition cursor-pointer border-b border-gray-500/20">বাংলা (Bangla)</button>
                            <button onclick="setLanguage('es', 'Español')" class="w-full px-4 py-3 text-left hover:bg-blue-500 hover:text-white transition cursor-pointer border-b border-gray-500/20">Español</button>
                            <button onclick="setLanguage('pt', 'Português')" class="w-full px-4 py-3 text-left hover:bg-blue-500 hover:text-white transition cursor-pointer">Português</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Credits Box -->
            <div class="mt-10 p-4 bg-black/5 dark:bg-white/5 rounded-2xl backdrop-blur-sm border border-black/10 dark:border-white/10 text-left relative z-10">
                <p class="text-xs uppercase tracking-widest opacity-50 mb-2 font-bold" id="t-developed">Developed By</p>
                <p class="text-xl font-bold mb-3">Ishraq Ahmed</p>
                <div class="flex flex-col gap-2 text-sm">
                    <a href="http://www.ishraq.piixen.com" target="_blank" class="flex items-center gap-2 hover:text-blue-500 transition interactive cursor-pointer">
                        <i class="ph ph-globe"></i> www.ishraq.piixen.com
                    </a>
                    <a href="https://github.com/ARIK-999" target="_blank" class="flex items-center gap-2 hover:text-purple-500 transition interactive cursor-pointer">
                        <i class="ph ph-github-logo"></i> GitHub: ARIK-999
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP CONTAINER -->
    <div id="app" class="hidden absolute inset-0 w-full h-full">
        <!-- Live Video Feed -->
        <video id="videoElement" class="absolute w-full h-full object-cover mirrored" playsinline autoplay></video>
        
        <!-- Canvas for Persistent Drawing -->
        <canvas id="drawCanvas" class="absolute w-full h-full object-cover mirrored"></canvas>
        
        <!-- Canvas for AR UI (Skeleton, Bounding Boxes, Temporary UI) -->
        <canvas id="arCanvas" class="absolute w-full h-full object-cover mirrored"></canvas>

        <!-- Loading Overlay during AI Boot -->
        <div id="loading-overlay" class="absolute inset-0 z-40 flex flex-col items-center justify-center bg-black/80 text-white hidden">
            <i class="ph ph-spinner-gap animate-spin text-6xl mb-4 text-blue-500"></i>
            <h2 id="loading-text" class="text-xl font-bold tracking-widest animate-pulse">BOOTING NEURAL ENGINES...</h2>
        </div>

        <!-- 3. IN-APP UI LAYER (Not mirrored) -->
        <div id="ui-layer" class="absolute inset-0 pointer-events-none p-4 flex flex-col justify-between z-30">
            
            <!-- Top Bar: Controls -->
            <div class="flex justify-between items-start interactive">
                <!-- Mode Switcher -->
                <div class="glass-panel p-2 rounded-2xl flex gap-2">
                    <button onclick="setMode('DRAW')" id="btn-mode-draw" class="px-6 py-3 rounded-xl font-bold bg-white dark:bg-white text-black transition-all shadow-md flex items-center gap-2 cursor-pointer">
                        <i class="ph ph-paint-brush"></i> <span id="t-modedraw">Draw</span>
                    </button>
                    <button onclick="setMode('IDENTIFY')" id="btn-mode-identify" class="px-6 py-3 rounded-xl font-bold hover:bg-white/20 text-black dark:text-white transition-all flex items-center gap-2 cursor-pointer">
                        <i class="ph ph-scan"></i> <span id="t-modeid">Identify</span>
                    </button>
                </div>

                <!-- Utilities -->
                <div class="flex gap-2">
                    <button onclick="clearCanvas()" class="glass-panel w-12 h-12 rounded-xl flex items-center justify-center hover:bg-red-500/50 transition interactive cursor-pointer" title="Clear Canvas">
                        <i class="ph ph-trash text-xl"></i>
                    </button>
                    <button onclick="toggleTheme()" class="glass-panel w-12 h-12 rounded-xl flex items-center justify-center hover:bg-white/20 transition interactive cursor-pointer">
                        <i class="ph ph-moon dark:hidden text-xl"></i>
                        <i class="ph ph-sun hidden dark:block text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Bottom Bar: Tools (Only visible in DRAW mode) -->
            <div id="toolbar" class="glass-panel p-4 rounded-3xl self-center flex items-center gap-4 interactive transition-opacity duration-300 overflow-x-auto max-w-full">
                
                <!-- Tools (Brush vs Eraser) -->
                <div class="flex gap-2 items-center border-r border-gray-500/30 pr-4">
                    <button id="tool-eraser" onclick="setTool('ERASER')" class="w-10 h-10 rounded-full flex items-center justify-center border-2 border-transparent bg-gray-200 dark:bg-zinc-800 hover:scale-110 transition shadow-lg text-black dark:text-white relative cursor-pointer" title="Physical Eraser Tool">
                        <i class="ph ph-eraser text-xl"></i>
                    </button>
                </div>

                <!-- 5 Core Colors + Custom Picker -->
                <div class="flex gap-3 items-center border-r border-gray-500/30 pr-4">
                    <button id="color-btn-white" onclick="setColor('#FFFFFF')" class="color-btn w-8 h-8 rounded-full border-2 border-gray-400 bg-white hover:scale-110 transition shadow-lg cursor-pointer"></button>
                    <button id="color-btn-black" onclick="setColor('#000000')" class="color-btn w-8 h-8 rounded-full border-2 border-gray-400 bg-black hover:scale-110 transition shadow-lg cursor-pointer"></button>
                    <button id="color-btn-primary" onclick="setColor('#FF3366')" class="color-btn w-8 h-8 rounded-full border-2 border-white bg-[#FF3366] hover:scale-110 transition shadow-lg ring-2 ring-[#FF3366] cursor-pointer"></button>
                    <button id="color-btn-green" onclick="setColor('#00E676')" class="color-btn w-8 h-8 rounded-full border-2 border-white bg-[#00E676] hover:scale-110 transition shadow-lg cursor-pointer"></button>
                    <button id="color-btn-blue" onclick="setColor('#2979FF')" class="color-btn w-8 h-8 rounded-full border-2 border-white bg-[#2979FF] hover:scale-110 transition shadow-lg cursor-pointer"></button>
                    
                    <!-- Custom Color Picker -->
                    <div class="relative w-8 h-8 rounded-full overflow-hidden hover:scale-110 transition border-2 border-white shadow-lg cursor-pointer" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);">
                        <input type="color" id="custom-color" class="absolute -top-2 -left-2 w-12 h-12 opacity-0 cursor-pointer" onchange="setColor(this.value)">
                    </div>
                </div>

                <!-- Brush Sizes -->
                <div class="flex gap-3 items-center">
                    <button onclick="setBrush(4)" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded-full transition cursor-pointer"><div class="w-2 h-2 bg-current rounded-full pointer-events-none"></div></button>
                    <button onclick="setBrush(8)" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded-full transition cursor-pointer"><div class="w-4 h-4 bg-current rounded-full pointer-events-none"></div></button>
                    <button onclick="setBrush(16)" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded-full transition cursor-pointer"><div class="w-6 h-6 bg-current rounded-full pointer-events-none"></div></button>
                </div>
                
                <div class="text-[10px] sm:text-xs opacity-70 font-mono tracking-widest ml-1 border-l border-gray-500/30 pl-4 hidden md:block">
                    1 FINGER = USE TOOL<br>FULL PALM = AREA ERASE
                </div>
            </div>
            
            <!-- Identify Mode HUD Info (Only visible in IDENTIFY mode) -->
            <div id="identify-hud" class="hidden glass-panel p-4 rounded-2xl self-center text-center interactive mb-4 border border-[#00ffcc] ai-active">
                <p class="text-[#00ffcc] font-mono text-sm tracking-widest font-bold mb-1"><i class="ph ph-scan text-lg align-middle"></i> SCANNING ENVIRONMENT...</p>
                <p class="text-xs opacity-80" id="t-idhint">Detecting Objects, Humans, Age & Emotion in real-time.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
